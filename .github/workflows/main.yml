name: Sync main Branch to Personal Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout org repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Debug auth
        env:
          TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          git ls-remote https://x-access-token:$TOKEN@github.com/ArnavSingh04/Allatura--Expense-Managment-Saas.git

      - name: Push to personal repo
        env:
          TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          git config --global user.name "ArnavSingh04"
          git config --global user.email "arnavsingh.sethi@gmail.com"

          git remote remove personal || true
          git remote add personal "https://x-access-token:${TOKEN}@github.com/ArnavSingh04/Allatura--Expense-Managment-Saas.git"

          git push personal main:main --force 
